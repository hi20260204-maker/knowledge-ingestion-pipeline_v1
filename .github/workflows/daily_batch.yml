name: Daily Ingestion Batch

on:
  schedule:
    # Runs at 22:00 UTC (07:00 KST) everyday
    - cron: '0 22 * * *'
  workflow_dispatch: # Allows manual trigger requested in PLAN.MD

concurrency:
  group: ingestion-pipeline
  cancel-in-progress: false # We do not want to cancel an already running ingestion logic midway, wait instead

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python run.py
          
      - name: Commit and Push DB & Markdown Archives
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Force create docs if it doesn't exist to prevent git error, though pipeline handles it
          mkdir -p docs
          git add docs/ knowledge.db
          git commit -m "chore: auto-update daily ingest DB & markdown archives" || echo "No changes to commit"
          git push || echo "No changes to push"
